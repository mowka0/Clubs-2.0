server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # Проксирование API-запросов на backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        # Загрузка аватаров идёт через /api/upload (backend ограничивает 5 МБ).
        # Дефолт nginx — 1 МБ, что даёт 413 Request Entity Too Large
        # для типичных фото с телефона — поднимаем до 6 МБ (1 МБ запаса сверх лимита backend).
        client_max_body_size 6M;
    }

    # Публичные загрузки (аватары и т.д.) — проксируем на MinIO по внутренней сети.
    # Собственный порт MinIO НЕ выставлен наружу, поэтому фасад здесь.
    # Backend возвращает относительные URL вида "/uploads/<uuid>.png" (S3_BASE_URL пустой),
    # а nginx переписывает их в path-style MinIO "<minio>/<bucket>/<key>".
    # Имя бакета захардкожено под дефолт docker-compose (S3_BUCKET=clubs-uploads);
    # если бакет переименуют в env — обновить и здесь.
    #
    # ^~ важен: без него ниже побеждает regex-location для *.jpg/*.png
    # (nginx предпочитает совпадающие regex-локации перед префиксными), и запросы к
    # /uploads/<uuid>.jpg попадают в try_files → 404 вместо проксирования на MinIO.
    location ^~ /uploads/ {
        proxy_pass http://minio:9000/clubs-uploads/uploads/;
        proxy_set_header Host $http_host;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-meta-server-side-encryption;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Статика с хэшем в имени — безопасно кэшировать навсегда, имя файла меняется при изменении контента.
    # Примечание: add_header внутри location заменяет (не объединяет) server-level заголовки,
    # поэтому security-заголовки нужно повторить здесь.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # index.html — никогда не кэшировать. Хэши внутри ссылаются на версионированные бандлы;
    # устаревший index.html заставит браузер запрашивать ассеты, которых после деплоя уже нет.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA fallback — все остальные маршруты отдают index.html (тоже не должен кэшироваться).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
