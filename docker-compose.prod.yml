services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Порт 5432 НЕ выставлен наружу в продакшене
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - clubs_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Порт 6379 НЕ выставлен наружу в продакшене
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - clubs_net

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # Порты 9000/9001 НЕ выставлены наружу в продакшене — доступ только через backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - clubs_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}  # 1ч по security.md; frontend apiClient автоматически повторяет 401 со свежим initData
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-clubs-uploads}
      # S3_BASE_URL намеренно не передаётся: backend возвращает относительные URL,
      # а frontend nginx проксирует /uploads/ на MinIO во внутренней сети.
      # Задавай S3_BASE_URL в env только если публикуешь MinIO наружу по отдельному hostname.
      AWS_REGION: us-east-1
      # Уровни логирования — переопределяются без пересборки через env-переменные Coolify:
      # LOGGING_LEVEL_COM_CLUBS=DEBUG  →  подробные логи приложения
      # LOGGING_LEVEL_ROOT=WARN        →  тихий режим
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - clubs_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    labels:
      - "traefik.docker.network=coolify"
      # Здесь намеренно нет явного лейбла traefik.http.services.*.loadbalancer.
      # Деплоер Coolify не подставляет переменные в КЛЮЧАХ лейблов Traefik,
      # поэтому `${TRAEFIK_SERVICE_NAME:-...}` попадал И в prod, И в staging
      # контейнеры как одна и та же буквальная строка, из-за чего Traefik
      # объединял их в один load-balancer пул и балансировал запросы round-robin между ними.
      # Без этого лейбла Traefik сам создаёт per-container сервис,
      # используя порт из Dockerfile EXPOSE, а автоматически сгенерированные
      # Coolify роутеры для каждого приложения подключаются только к своему контейнеру.
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - clubs_net
      - coolify

networks:
  clubs_net:
    driver: bridge
  coolify:
    external: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
