# Память сборки. Дефолтного heap gradle (512m) не хватало Kotlin-компилятору на app +
# сгенерённые jOOQ-файлы → java.lang.OutOfMemoryError в :compileKotlin при Docker-деплое
# на тесном VPS (4GB). Поднимаем heap и компилируем in-process — в JVM самого gradle,
# без отдельной JVM Kotlin-демона (одна JVM вместо двух — экономия RAM на VPS, где рядом
# крутятся прод+staging бэкенды).
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m
kotlin.compiler.execution.strategy=in-process
