logging:
  level:
    # Переопределяются в рантайме через env vars без пересборки:
    #   LOGGING_LEVEL_COM_CLUBS=DEBUG
    #   LOGGING_LEVEL_ROOT=WARN
    #   LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=DEBUG
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.clubs: ${LOGGING_LEVEL_COM_CLUBS:INFO}
    org.springframework.web: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:WARN}
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:WARN}
    org.hibernate: ${LOGGING_LEVEL_ORG_HIBERNATE:WARN}
    org.flywaydb: ${LOGGING_LEVEL_ORG_FLYWAYDB:INFO}
  pattern:
    # Формат строки консольного лога: время [поток] уровень логгер - сообщение.
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/clubs}
    username: ${DB_USER:clubs}
    password: ${DB_PASSWORD:clubs_secret}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      # Лимит размера загружаемого файла (аватары/фото) и всего multipart-запроса.
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:8080}

# Actuator: наружу открыты только health/info/metrics; детали health — только авторизованным.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

jwt:
  # Секрет подписи JWT (HS256). Дефолт — заглушка только для локальной разработки;
  # в staging/prod обязателен настоящий JWT_SECRET (≥256 бит, openssl rand -base64 32).
  secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-32-chars}
  # TTL 1 час по security.md. Фронтовый apiClient умеет 401-retry со свежим
  # initData (authenticate() + дедупликация authInFlight), так что пользователь
  # переавторизуется бесшовно, без разлогина. Переопределяется через JWT_EXPIRATION (мс).
  expiration: ${JWT_EXPIRATION:3600000}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  # Bot username (без @) — используется в Mini App deep-link URL вида
  # https://t.me/<bot-username>/app?startapp=... В DM inline-кнопках.
  # Prod: clubs_v2_bot, Staging: clubs_v2_test_bot.
  bot-username: ${TELEGRAM_BOT_USERNAME:clubs_v2_bot}
  # Base URL фронта Mini App — используется в WebApp inline-кнопках
  # для прямой навигации на deep route (например /skladchina/<id>).
  # Telegram не позволяет ботам шлать t.me/<self-bot>/... ссылки в DM
  # с тем же ботом (циклическая ссылка), поэтому используем именно
  # frontend URL через WebAppInfo.
  # Prod: https://77-42-23-177.sslip.io, Staging: https://staging.77-42-23-177.sslip.io
  webapp-base-url: ${TELEGRAM_WEBAPP_BASE_URL:https://77-42-23-177.sslip.io}

# Хранилище загрузок (MinIO/S3): имя бакета и публичный базовый URL для ссылок на файлы.
s3:
  bucket: ${S3_BUCKET:clubs-uploads}
  base-url: ${S3_BASE_URL:http://localhost:9000/clubs-uploads}

features:
  # Kill-switch пути member-pays (монетизация v2). Движок подписок поддерживает обе роли плательщика,
  # но путь member-pays (участник платит за премиум "Clubs+") выключен, пока не вырастет аудитория и
  # не появится HQ-премиум, который есть смысл разблокировать (payment-v2.md §2.2, §10). Organizer-pays
  # работает всегда и этим флагом не гейтится. Включение: MEMBER_PAYS_ENABLED=true в Coolify (без пересборки).
  member-pays-enabled: ${MEMBER_PAYS_ENABLED:false}

subscription:
  # Оплаченный период за одно списание (стаб-провайдер). В днях, чтобы staging мог
  # ужать его для теста окончания периода.
  period-days: ${SUBSCRIPTION_PERIOD_DAYS:30}
  # Cron для SubscriptionScheduler.endElapsedSubscriptions. По умолчанию ежедневно 09:30 UTC.
  lifecycle-cron: ${SUBSCRIPTION_LIFECYCLE_CRON:0 30 9 * * *}

membership:
  # De-Stars Slice 2: на какой срок один подтверждённый взнос участника («Взнос получен») даёт доступ
  # к клубу. В днях, чтобы staging мог ужать его для теста авто-истечения → frozen.
  access-period-days: ${MEMBERSHIP_ACCESS_PERIOD_DAYS:30}

club:
  rank:
    # Kill-switch бейджа L3 «★ Топ-5 в категории». Скрытый ранг считается ВСЕГДА (машинерия и
    # анти-фарм инварианты — сами по себе deliverable); флаг управляет только рендером публичного
    # бейджа. По умолчанию OFF — на проде с ~10 клубами бейдж был бы статистическим шумом, поэтому
    # он подавлен, пока категории не наполнятся. Включение: CLUB_RANK_BADGE_ENABLED=true в Coolify
    # (без пересборки). Даже при true бейдж дополнительно гейтится in-code порогом GLOBAL_RANK_FLOOR.
    badge-enabled: ${CLUB_RANK_BADGE_ENABLED:false}

# Тайминги жизненного цикла событий. Дефолты соответствуют PRD (окно спора 48ч, финализация
# раз в час). Вынесены в конфиг, чтобы staging мог ужать их для сквозного теста репутации
# без пересборки — см. docs/modules/events.md § "Конфигурация таймингов".
events:
  # Окно оспаривания посещаемости до финализации репутации. В минутах, чтобы staging мог
  # поставить буквально 5. Дефолт 2880 = 48ч (PRD §4.4.3). Env: ATTENDANCE_DISPUTE_WINDOW_MINUTES
  dispute-window-minutes: ${ATTENDANCE_DISPUTE_WINDOW_MINUTES:2880}
  # EXP-2: дедлайн (минут после event_datetime), после которого прошедшее событие с так и не
  # отмеченной посещаемостью нейтрально авто-финализируется (все confirmed → 0, без строк в ledger).
  # Защищает надёжных участников от неактивного организатора. Дефолт 2880 = 48ч (24ч напоминание
  # организатору + 24ч grace). В минутах, чтобы staging мог поставить буквально 5.
  # Env: ATTENDANCE_AUTO_FINALIZE_UNMARKED_MINUTES
  auto-finalize-unmarked-minutes: ${ATTENDANCE_AUTO_FINALIZE_UNMARKED_MINUTES:2880}
  # Период опроса AttendanceService.finalizeAttendance (мс). Дефолт 3600000 = 1ч.
  finalize-poll-ms: ${ATTENDANCE_FINALIZE_POLL_MS:3600000}
  # Период опроса Stage2Service.expireUnconfirmedParticipants (мс). Дефолт 300000 = 5мин.
  stage2-expire-poll-ms: ${STAGE2_EXPIRE_POLL_MS:300000}
  # За сколько минут до старта события оно авто-переходит в Этап 2 (подтверждение).
  # Дефолт 1440 = 24ч (PRD §4.4.2). В минутах, чтобы staging мог поставить малое значение
  # и сохранить короткое окно голосования Этапа 1 перед переключением — так двухэтапный
  # флоу тестируется сквозняком. Env: STAGE2_TRIGGER_MINUTES_BEFORE
  stage2-trigger-minutes-before: ${STAGE2_TRIGGER_MINUTES_BEFORE:1440}
  # Период опроса Stage2Service.triggerStage2ForReadyEvents (мс). Окно подтверждения =
  # stage2-trigger-minutes-before МИНУС фаза шедулера, поэтому тик должен быть сильно мельче
  # lead-времени триггера — старый захардкоженный тик 5мин съедал короткий lead целиком
  # (при lead 3мин переключение часто попадало ПОСЛЕ старта события → нулевое окно
  # подтверждения, тупиковый DM). Дефолт 60000 = 1мин. Env: STAGE2_POLL_MS
  stage2-poll-ms: ${STAGE2_POLL_MS:60000}
  # Период опроса EventReminderScheduler (мс). Дефолт 300000 = 5мин.
  reminder-poll-ms: ${EVENT_REMINDER_POLL_MS:300000}
  # Окно DM-напоминания «подтвердите участие»: за сколько минут до события оно уходит.
  # Дефолт 120 (= 2ч). В минутах, чтобы staging мог поставить малое значение (например 5) для теста.
  confirm-reminder-minutes-before: ${CONFIRM_REMINDER_MINUTES_BEFORE:120}
  # DM-напоминание организатору отметить посещаемость: через сколько минут после события.
  # Дефолт 1440 (= 24ч). В минутах по той же причине.
  attendance-reminder-minutes-after: ${ATTENDANCE_REMINDER_MINUTES_AFTER:1440}

# Тайминги уведомлений складчины (SkladchinaReminderScheduler). Вынесены в конфиг,
# чтобы staging мог ужать их для сквозного теста «важного сбора» без пересборки.
skladchinas:
  # Период опроса SkladchinaReminderScheduler (мс). Дефолт 300000 = 5мин.
  reminder-poll-ms: ${SKLADCHINA_REMINDER_POLL_MS:300000}
  # Окно DM-напоминания о дедлайне: за сколько минут до дедлайна оно уходит pending-участникам
  # складчины, влияющей на репутацию. Дефолт 1440 (= 24ч). В минутах, чтобы staging мог
  # поставить малое значение (например 5) для теста.
  deadline-reminder-minutes-before: ${SKLADCHINA_DEADLINE_REMINDER_MINUTES_BEFORE:1440}

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    enabled: true
    baseline-on-migrate: true
    # Существующая dev-БД без истории Flyway помечается как уже прошедшая миграции по V9 включительно.
    baseline-version: 9

s3:
  bucket: clubs-uploads
  base-url: http://localhost:9000/clubs-uploads

---
spring:
  config:
    activate:
      on-profile: prod
  flyway:
    enabled: true

s3:
  bucket: ${S3_BUCKET:clubs-uploads}
  # По умолчанию пусто — бэкенд тогда возвращает относительные URL вида "/uploads/<uuid>.png",
  # которые фронтовый nginx проксирует во внутренний MinIO (см. frontend/nginx.conf).
  # Переопределять только когда MinIO выставлен наружу под собственным hostname.
  base-url: ${S3_BASE_URL:}
