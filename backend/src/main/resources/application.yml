logging:
  level:
    # Override at runtime via env vars without rebuilding:
    #   LOGGING_LEVEL_COM_CLUBS=DEBUG
    #   LOGGING_LEVEL_ROOT=WARN
    #   LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=DEBUG
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.clubs: ${LOGGING_LEVEL_COM_CLUBS:INFO}
    org.springframework.web: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:WARN}
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:WARN}
    org.hibernate: ${LOGGING_LEVEL_ORG_HIBERNATE:WARN}
    org.flywaydb: ${LOGGING_LEVEL_ORG_FLYWAYDB:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/clubs}
    username: ${DB_USER:clubs}
    password: ${DB_PASSWORD:clubs_secret}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-32-chars}
  # 1 hour TTL per security.md. Frontend apiClient has 401-retry with fresh
  # initData (authenticate() + authInFlight dedup), so users get a seamless
  # re-auth without being logged out. Override via JWT_EXPIRATION (ms).
  expiration: ${JWT_EXPIRATION:3600000}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  # Bot username (без @) — используется в Mini App deep-link URL вида
  # https://t.me/<bot-username>/app?startapp=... В DM inline-кнопках.
  # Prod: clubs_v2_bot, Staging: clubs_v2_test_bot.
  bot-username: ${TELEGRAM_BOT_USERNAME:clubs_v2_bot}
  # Base URL фронта Mini App — используется в WebApp inline-кнопках
  # для прямой навигации на deep route (например /skladchina/<id>).
  # Telegram не позволяет ботам шлать t.me/<self-bot>/... ссылки в DM
  # с тем же ботом (циклическая ссылка), поэтому используем именно
  # frontend URL через WebAppInfo.
  # Prod: https://77-42-23-177.sslip.io, Staging: https://staging.77-42-23-177.sslip.io
  webapp-base-url: ${TELEGRAM_WEBAPP_BASE_URL:https://77-42-23-177.sslip.io}

s3:
  bucket: ${S3_BUCKET:clubs-uploads}
  base-url: ${S3_BASE_URL:http://localhost:9000/clubs-uploads}

# Event lifecycle timing knobs. Defaults match PRD (48h dispute window, hourly
# finalize). Externalised so staging can shrink them for an end-to-end reputation
# test without a rebuild — see docs/modules/events.md § "Конфигурация таймингов".
events:
  # Attendance dispute window before reputation finalizes. Minutes so staging can
  # set a literal 5. Default 2880 = 48h (PRD §4.4.3). Env: ATTENDANCE_DISPUTE_WINDOW_MINUTES
  dispute-window-minutes: ${ATTENDANCE_DISPUTE_WINDOW_MINUTES:2880}
  # EXP-2: deadline (minutes after event_datetime) after which a past event whose attendance
  # was never marked is neutrally auto-finalized (all confirmed → 0, no ledger rows). Protects
  # reliable participants from an inactive organizer. Default 2880 = 48h (24h organizer reminder
  # + 24h grace). Minutes so staging can set a literal 5. Env: ATTENDANCE_AUTO_FINALIZE_UNMARKED_MINUTES
  auto-finalize-unmarked-minutes: ${ATTENDANCE_AUTO_FINALIZE_UNMARKED_MINUTES:2880}
  # AttendanceService.finalizeAttendance poll period (ms). Default 3600000 = 1h.
  finalize-poll-ms: ${ATTENDANCE_FINALIZE_POLL_MS:3600000}
  # Stage2Service.expireUnconfirmedParticipants poll period (ms). Default 300000 = 5min.
  stage2-expire-poll-ms: ${STAGE2_EXPIRE_POLL_MS:300000}
  # Lead time (minutes before event start) at which an upcoming event auto-transitions to
  # Stage 2 (confirmation). Default 1440 = 24h (PRD §4.4.2). Minutes so staging can set a
  # small value and keep a brief Stage-1 voting window before the flip, making the full
  # two-stage flow testable end-to-end. Env: STAGE2_TRIGGER_MINUTES_BEFORE
  stage2-trigger-minutes-before: ${STAGE2_TRIGGER_MINUTES_BEFORE:1440}
  # EventReminderScheduler poll period (ms). Default 300000 = 5min.
  reminder-poll-ms: ${EVENT_REMINDER_POLL_MS:300000}
  # Confirm-participation reminder DM window: minutes before the event it fires.
  # Default 120 (= 2h). Minutes unit so staging can set a small value (e.g. 5) for testing.
  confirm-reminder-minutes-before: ${CONFIRM_REMINDER_MINUTES_BEFORE:120}
  # Organizer mark-attendance reminder DM: minutes after the event it fires.
  # Default 1440 (= 24h). Minutes unit for the same reason.
  attendance-reminder-minutes-after: ${ATTENDANCE_REMINDER_MINUTES_AFTER:1440}

# Skladchina notification timing knobs (SkladchinaReminderScheduler). Externalised so
# staging can shrink them for an end-to-end "важный сбор" test without a rebuild.
skladchinas:
  # SkladchinaReminderScheduler poll period (ms). Default 300000 = 5min.
  reminder-poll-ms: ${SKLADCHINA_REMINDER_POLL_MS:300000}
  # Deadline reminder DM window: minutes before the deadline it fires for pending
  # participants of a reputation-affecting skladchina. Default 1440 (= 24h). Minutes
  # unit so staging can set a small value (e.g. 5) for testing.
  deadline-reminder-minutes-before: ${SKLADCHINA_DEADLINE_REMINDER_MINUTES_BEFORE:1440}

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 9

s3:
  bucket: clubs-uploads
  base-url: http://localhost:9000/clubs-uploads

---
spring:
  config:
    activate:
      on-profile: prod
  flyway:
    enabled: true

s3:
  bucket: ${S3_BUCKET:clubs-uploads}
  # Empty by default — backend then returns relative URLs like "/uploads/<uuid>.png",
  # which the frontend nginx proxies to internal MinIO (see frontend/nginx.conf).
  # Override only when MinIO is exposed publicly via its own hostname.
  base-url: ${S3_BASE_URL:}
