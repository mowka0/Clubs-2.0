<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Чипы — читаемость без большой полки</title>
<style>
:root {
  --bg:#0B0B0E; --text:#F4F4F6; --text-dim:rgba(244,244,246,0.6); --text-faint:rgba(244,244,246,0.45);
  --panel:#17171C; --hairline:rgba(255,255,255,0.06); --hairline-2:rgba(255,255,255,0.1);
  --chip-bg:rgba(255,255,255,0.07); --chip-bd:rgba(255,255,255,0.13);
  --accent:#F47B3C; --accent-deep:#D5611C; --accent-soft:rgba(244,123,60,0.14);
  --accent-grad:linear-gradient(135deg,#FFA070 0%,#F47B3C 100%); --on-accent:#2A0E04;
  --live:#66D49A; --page:#141416; --shelf-hl:rgba(255,255,255,0.10);
}
[data-theme="light"] {
  --bg:#F7F6F3; --text:#1A1A1A; --text-dim:#6B6B70; --text-faint:#8A8A8E;
  --panel:#FFFFFF; --hairline:rgba(0,0,0,0.06); --hairline-2:rgba(0,0,0,0.1);
  --chip-bg:rgba(0,0,0,0.05); --chip-bd:rgba(0,0,0,0.1);
  --accent-soft:rgba(244,123,60,0.12); --accent-grad:linear-gradient(135deg,#F47B3C 0%,#D5611C 100%); --on-accent:#FFFFFF;
  --live:#2E7D5A; --page:#E9E7E2; --shelf-hl:rgba(255,255,255,0.9);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif; background:var(--page); color:var(--text); -webkit-font-smoothing:antialiased; }
.topbar { position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 24px; background:var(--page); border-bottom:1px solid var(--hairline); }
.topbar h1 { font-size:17px; font-weight:800; letter-spacing:-0.02em; }
.topbar .hint { font-size:12px; color:var(--text-dim); margin-top:2px; }
.toggle { display:inline-flex; align-items:center; gap:8px; height:36px; padding:0 15px; border-radius:999px; border:1px solid var(--hairline-2); background:var(--panel); color:var(--text); font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
.rail { display:flex; gap:30px; padding:30px 28px; overflow-x:auto; align-items:flex-start; }
.col { width:330px; flex-shrink:0; }
.col .cap { display:flex; align-items:flex-start; gap:9px; margin:0 4px 14px; min-height:56px; }
.col .cap .k { width:24px; height:24px; flex-shrink:0; border-radius:7px; background:var(--accent-grad); color:var(--on-accent); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; }
.col .cap .t { font-size:14px; font-weight:800; letter-spacing:-0.01em; }
.col .cap .d { font-size:11.5px; color:var(--text-dim); margin-top:2px; line-height:1.35; }

.card { position:relative; border-radius:18px; overflow:hidden; background:var(--panel); border:1px solid var(--hairline-2); box-shadow:0 8px 26px rgba(0,0,0,0.28); margin-bottom:14px; }
.cov { height:104px; position:relative; }
.cov[data-cat="sport"] { background:radial-gradient(circle at 70% 30%, rgba(255,232,200,0.5), transparent 50%), linear-gradient(135deg,#F47B3C 0%,#5a3f1f 60%,#1a1108 100%); }
.cov[data-cat="party"] { background:radial-gradient(circle at 75% 25%, rgba(255,200,180,0.35), transparent 55%), linear-gradient(135deg,#A6342A 0%,#6e1f18 55%,#260a08 100%); }
.cov::after { content:''; position:absolute; inset:0; pointer-events:none; }
.price-chip { position:absolute; z-index:3; top:10px; right:12px; font-size:12px; font-weight:700; color:#fff; background:rgba(0,0,0,0.5); padding:4px 10px; border-radius:999px; backdrop-filter:blur(8px); }
.date-badge { position:absolute; z-index:3; top:10px; left:12px; font-size:11px; font-weight:800; color:var(--on-accent); background:var(--accent-grad); padding:4px 9px; border-radius:999px; }
.chip-row { position:absolute; left:12px; bottom:10px; z-index:2; display:flex; gap:6px; }
.body { padding:9px 14px 14px; }
.body .ttl { font-size:15.5px; font-weight:700; letter-spacing:-0.01em; }
.body .loc { margin-top:4px; font-size:12px; color:var(--text-dim); display:inline-flex; align-items:center; gap:5px; }
.body .loc svg { width:12px; height:12px; opacity:0.7; flex-shrink:0; }
.cc { display:inline-flex; align-items:center; gap:5px; padding:4px 9px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap; }
.cc svg { width:11px; height:11px; flex-shrink:0; }

/* ── O1: слим-полка (тонкая, 40px) ── */
.o1 .cov::after { background:linear-gradient(180deg, rgba(11,11,14,0.30) 0%, transparent 42%); }
.o1 .shelf { position:absolute; left:0; right:0; bottom:0; height:40px; z-index:1; background:var(--panel);
  clip-path:path('M0,40 L0,14 Q0,6 10,6 L320,6 L330,6 Q330,6 330,16 L330,40 Z'); }
.o1 .shelf { clip-path:path('M0,40 L0,14 Q0,6 10,6 L320,6 Q330,6 330,16 L330,40 Z'); }
.o1 .shelf::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,var(--shelf-hl) 0, transparent 2.5px); opacity:0.6; clip-path:path('M0,40 L0,14 Q0,6 10,6 L320,6 Q330,6 330,16 L330,40 Z'); }
.o1 .cc { background:var(--chip-bg); border:1px solid var(--chip-bd); color:var(--text); }
.o1 .cc svg { color:var(--text-faint); }
.o1 .cc.ok, .o1 .cc.ok svg { color:var(--live); }

/* ── O2: фрост-пилюли на фото (без полки) ── */
.o2 .cov::after { background:linear-gradient(180deg, rgba(11,11,14,0.30) 0%, transparent 40%, rgba(11,11,14,0.35) 100%); }
.o2 .cc { background:rgba(0,0,0,0.52); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.18); color:#fff; }
.o2 .cc svg { color:rgba(255,255,255,0.8); }
.o2 .cc.ok { color:#8CEBB8; } .o2 .cc.ok svg { color:#8CEBB8; }

/* ── O3: голый текст на мягком скриме (лёгкий, но рискованный) ── */
.o3 .cov::after { background:linear-gradient(180deg, rgba(11,11,14,0.30) 0%, transparent 38%, rgba(11,11,14,0.62) 100%); }
.o3 .chip-row { gap:12px; left:14px; }
.o3 .cc { padding:0; background:none; border:0; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.6); font-weight:800; }
.o3 .cc svg { color:rgba(255,255,255,0.85); }
.o3 .cc.ok { color:#8CEBB8; } .o3 .cc.ok svg { color:#8CEBB8; }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>Читаемость чипов без большой полки — 3 подхода</h1>
    <div class="hint">Спортивная карточка (яркий фон) — стресс-тест «сольются ли цифры». Кнопка справа — тема.</div>
  </div>
  <button class="toggle" onclick="var h=document.documentElement; h.dataset.theme = h.dataset.theme==='light'?'':'light'; this.querySelector('.tx').textContent = h.dataset.theme==='light'?'Тёмная тема':'Светлая тема';">
    <span>◐</span><span class="tx">Светлая тема</span>
  </button>
</div>
<div class="rail" id="rail"></div>
<script>
const CLK=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`;
const PPL=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3 2.7-5 6-5s6 2 6 5"/><path d="M16 6a3 3 0 0 1 0 6"/></svg>`;
const BLT=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>`;
const PIN=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
const chips = `<span class="cc">${CLK}145 дн</span><span class="cc">${PPL}24</span><span class="cc ok">${BLT}78%</span>`;
const chipsP = `<span class="cc">${CLK}88 дн</span><span class="cc">${PPL}3</span><span class="cc ok">${BLT}100%</span>`;
function card(cls, cat, opts){
  const shelf = cls==='o1' ? '<div class="shelf"></div>' : '';
  const title = cat==='sport' ? 'Беговой клуб «Второе дыхание»' : 'Партия';
  const loc = cat==='sport' ? 'Москва · Хамовники, парк' : 'Москва · Пресня';
  const price = cat==='sport' ? '1 200 ₽/мес' : 'бесплатно';
  const badge = cat==='sport' ? '<span class="date-badge">встреча 19:30</span>' : '';
  const ch = cat==='sport' ? chips : chipsP;
  return `<div class="card ${cls}"><div class="cov" data-cat="${cat}">${badge}<span class="price-chip">${price}</span>${shelf}<div class="chip-row">${ch}</div></div><div class="body"><div class="ttl">${title}</div><div class="loc">${PIN}${loc}</div></div></div>`;
}
const OPTS = [
  ['o1','1','Слим-полка (тонкая)','Полка осталась, но тонкая — только под чипы. Цифры в цвет темы.'],
  ['o2','2','Фрост-пилюли без полки','У каждого чипа своя тёмная матовая подложка. Обложка не тронута совсем.'],
  ['o3','3','Голый текст на скриме','Без подложек, только текст с тенью на затемнении. Легче всего — но рискует сливаться.'],
];
const rail = document.getElementById('rail');
OPTS.forEach(([cls,k,t,d])=>{
  const col=document.createElement('div'); col.className='col';
  col.innerHTML=`<div class="cap"><div class="k">${k}</div><div><div class="t">${t}</div><div class="d">${d}</div></div></div>${card(cls,'sport')}${card(cls,'party')}`;
  rail.appendChild(col);
});
</script>
</body>
</html>
