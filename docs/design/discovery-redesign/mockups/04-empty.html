<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Discovery — Empty</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
  <div class="statusbar">
    <span>9:41</span>
    <span class="right">
      <span style="font-size:13px;font-weight:700">5G</span>
      <span class="battery"></span>
    </span>
  </div>

  <section class="hero">
    <h1 class="hero-title">Найди свой<br><span class="grad">клуб</span></h1>
    <p class="hero-sub">Сообщества по интересам — встречайтесь офлайн</p>
  </section>

  <div class="search-wrap">
    <div class="search">
      <span class="icon"></span>
      <input placeholder="Беговой клуб, книжный…" value="подводное плавание" style="color:var(--text)">
      <span class="city-pill"><span class="pin"></span>Москва</span>
    </div>
  </div>

  <div class="chips">
    <div class="chip">Все</div>
    <div class="chip active"><span class="e">🏃</span>Спорт</div>
    <div class="chip"><span class="e">🎨</span>Творчество</div>
    <div class="chip"><span class="e">🍳</span>Еда</div>
    <div class="chip"><span class="e">🎲</span>Настолки</div>
    <div class="chip"><span class="e">🎬</span>Кино</div>
    <div class="chip"><span class="e">📚</span>Образование</div>
  </div>

  <div class="empty">
    <div class="empty-illustration">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <h3>Ничего не нашли</h3>
    <p>Попробуй убрать фильтры или поискать в другом городе — клубы появляются каждую неделю</p>
    <button class="cta">Сбросить фильтры</button>
  </div>

  <div class="scroll-pad"></div>

  <nav class="tabbar">
    <div class="tab active"><span class="icon">🔎</span><span>Поиск</span></div>
    <div class="tab"><span class="icon">⭐</span><span>Клубы</span></div>
    <div class="tab"><span class="icon">🗓</span><span>События</span></div>
    <div class="tab"><span class="icon">👤</span><span>Я</span></div>
  </nav>
</body>
</html>
