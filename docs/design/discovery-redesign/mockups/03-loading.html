<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Discovery — Loading</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
  <div class="statusbar">
    <span>9:41</span>
    <span class="right">
      <span style="font-size:13px;font-weight:700">5G</span>
      <span class="battery"></span>
    </span>
  </div>

  <section class="hero">
    <h1 class="hero-title">Найди свой<br><span class="grad">клуб</span></h1>
    <p class="hero-sub">Сообщества по интересам — встречайтесь офлайн</p>
  </section>

  <div class="search-wrap">
    <div class="search">
      <span class="icon"></span>
      <input placeholder="Беговой клуб, книжный…">
      <span class="city-pill"><span class="pin"></span>Москва</span>
    </div>
  </div>

  <div class="chips">
    <div class="chip active">Все</div>
    <div class="chip"><span class="e">🏃</span>Спорт</div>
    <div class="chip"><span class="e">🎨</span>Творчество</div>
    <div class="chip"><span class="e">🍳</span>Еда</div>
    <div class="chip"><span class="e">🎲</span>Настолки</div>
    <div class="chip"><span class="e">🎬</span>Кино</div>
    <div class="chip"><span class="e">📚</span>Образование</div>
  </div>

  <div class="list-head">
    <span class="count">Загружаем клубы…</span>
  </div>

  <div class="cards">
    <div class="skeleton-card">
      <div class="shimmer a"></div>
      <div class="shimmer l1"></div>
      <div class="shimmer l2"></div>
      <div class="shimmer p"></div>
    </div>
    <div class="skeleton-card">
      <div class="shimmer a"></div>
      <div class="shimmer l1" style="width:60%"></div>
      <div class="shimmer l2" style="width:40%"></div>
      <div class="shimmer p"></div>
    </div>
    <div class="skeleton-card">
      <div class="shimmer a"></div>
      <div class="shimmer l1" style="width:75%"></div>
      <div class="shimmer l2" style="width:55%"></div>
      <div class="shimmer p"></div>
    </div>
    <div class="skeleton-card">
      <div class="shimmer a"></div>
      <div class="shimmer l1" style="width:50%"></div>
      <div class="shimmer l2" style="width:35%"></div>
      <div class="shimmer p"></div>
    </div>
    <div class="skeleton-card">
      <div class="shimmer a"></div>
      <div class="shimmer l1" style="width:65%"></div>
      <div class="shimmer l2" style="width:45%"></div>
      <div class="shimmer p"></div>
    </div>
  </div>

  <div class="scroll-pad"></div>

  <nav class="tabbar">
    <div class="tab active"><span class="icon">🔎</span><span>Поиск</span></div>
    <div class="tab"><span class="icon">⭐</span><span>Клубы</span></div>
    <div class="tab"><span class="icon">🗓</span><span>События</span></div>
    <div class="tab"><span class="icon">👤</span><span>Я</span></div>
  </nav>
</body>
</html>
