<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Onboarding — Categories Live</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
  <div class="statusbar">
    <span>9:41</span>
    <span class="right">
      <span style="font-size:13px;font-weight:700">5G</span>
      <span class="battery"></span>
    </span>
  </div>

  <div class="onb-top">
    <div class="onb-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="onb-progress">
      <div class="dot done"></div>
      <div class="dot active"></div>
    </div>
    <span class="onb-skip">Позже</span>
  </div>

  <div class="onb-content">
    <div class="onb-eyebrow">Шаг 2 из 2</div>
    <h2 class="onb-title">Что тебе <span class="grad">интересно?</span></h2>
    <p class="onb-sub">Выбери 1–3 направления — покажем подходящие клубы</p>

    <div class="cat-grid">
      <div class="cat-tile sport selected">
        <span class="trending">🔥 хит</span>
        <span class="emoji">🏃</span>
        <span class="label">Спорт</span>
        <div class="cluster">
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #FB7185;">Б</div>
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #FB7185;">Й</div>
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #FB7185;">К</div>
          <div class="avt more">+9</div>
        </div>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>

      <div class="cat-tile creative">
        <span class="emoji">🎨</span>
        <span class="label">Творчество</span>
        <div class="cluster">
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #6366F1;">А</div>
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #6366F1;">Ф</div>
          <div class="avt more">+5</div>
        </div>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>

      <div class="cat-tile food">
        <span class="emoji">🍳</span>
        <span class="label">Еда</span>
        <div class="cluster">
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #F97316;">К</div>
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #F97316;">В</div>
          <div class="avt more">+4</div>
        </div>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>

      <div class="cat-tile board_games selected">
        <span class="trending">🔥 хит</span>
        <span class="emoji">🎲</span>
        <span class="label">Настолки</span>
        <div class="cluster">
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #10B981;">С</div>
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #10B981;">Д</div>
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #10B981;">М</div>
          <div class="avt more">+7</div>
        </div>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>

      <div class="cat-tile cinema">
        <span class="emoji">🎬</span>
        <span class="label">Кино</span>
        <div class="cluster">
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #0EA5E9;">К</div>
          <div class="avt more">+2</div>
        </div>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>

      <div class="cat-tile education">
        <span class="emoji">📚</span>
        <span class="label">Образование</span>
        <div class="cluster">
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #6366F1;">К</div>
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #6366F1;">P</div>
          <div class="avt more">+6</div>
        </div>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>

      <div class="cat-tile travel">
        <span class="emoji">🥾</span>
        <span class="label">Путешествия</span>
        <div class="cluster">
          <div class="avt" style="background: rgba(255,255,255,0.5); color: #0891B2;">П</div>
          <div class="avt more">+3</div>
        </div>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>

      <div class="cat-tile other">
        <span class="emoji">✨</span>
        <span class="label">Другое</span>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
    </div>

    <div class="live-count">
      <div class="pulse-dot"></div>
      <div class="text"><strong>19 клубов</strong>подходят твоему выбору в Москве</div>
    </div>
  </div>

  <div class="onb-cta">
    <button>Готово · подобрать клубы</button>
  </div>
</body>
</html>
