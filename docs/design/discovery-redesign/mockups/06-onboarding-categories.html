<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Onboarding — Categories</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
  <div class="statusbar">
    <span>9:41</span>
    <span class="right">
      <span style="font-size:13px;font-weight:700">5G</span>
      <span class="battery"></span>
    </span>
  </div>

  <div class="onb-top">
    <div class="onb-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="onb-progress">
      <div class="dot done"></div>
      <div class="dot active"></div>
    </div>
    <span class="onb-skip">Позже</span>
  </div>

  <div class="onb-content">
    <div class="onb-eyebrow">Шаг 2 из 2</div>
    <h2 class="onb-title">Что тебе <span class="grad">интересно?</span></h2>
    <p class="onb-sub">Выбери 1–3 направления — покажем подходящие клубы</p>

    <div class="cat-grid">
      <div class="cat-tile sport selected">
        <span class="emoji">🏃</span>
        <span class="label">Спорт</span>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
      <div class="cat-tile creative">
        <span class="emoji">🎨</span>
        <span class="label">Творчество</span>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
      <div class="cat-tile food">
        <span class="emoji">🍳</span>
        <span class="label">Еда</span>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
      <div class="cat-tile board_games selected">
        <span class="emoji">🎲</span>
        <span class="label">Настолки</span>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
      <div class="cat-tile cinema">
        <span class="emoji">🎬</span>
        <span class="label">Кино</span>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
      <div class="cat-tile education">
        <span class="emoji">📚</span>
        <span class="label">Образование</span>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
      <div class="cat-tile travel">
        <span class="emoji">🥾</span>
        <span class="label">Путешествия</span>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
      <div class="cat-tile other">
        <span class="emoji">✨</span>
        <span class="label">Другое</span>
        <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
    </div>
  </div>

  <div class="onb-cta">
    <button>Готово · подобрать клубы</button>
    <div class="onb-helper">Выбрано 2 из 3</div>
  </div>
</body>
</html>
