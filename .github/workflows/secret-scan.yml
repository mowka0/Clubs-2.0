name: Secret scan

# Сканирует новые коммиты на утёкшие учётные данные. Область: только коммиты, привнесённые
# PR / push, исторический контент не трогаем. Исторические утечки (до ротации,
# до 2026-05-16) считаются мёртвыми и описаны в `docs/backlog/leaked-secrets-in-git.md`.

on:
  pull_request:
    branches: [master]
  push:
    branches:
      - master
      - 'bugfix/**'
      - 'feature/**'
      - 'devops/**'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # gitleaks-у нужна история коммитов, чтобы вычислить диапазон диффа

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
