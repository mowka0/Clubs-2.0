name: Secret scan

# Scans new commits for leaked credentials. Scope: only commits introduced
# by the PR / push, never historical content. Historical leaks (pre-rotation,
# pre-2026-05-16) are considered dead and live in `docs/backlog/leaked-secrets-in-git.md`.

on:
  pull_request:
    branches: [master]
  push:
    branches:
      - master
      - 'bugfix/**'
      - 'feature/**'
      - 'devops/**'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # gitleaks needs commit history to compute the diff range

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
