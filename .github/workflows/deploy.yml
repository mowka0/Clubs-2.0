name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Trigger Coolify Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify webhook
        run: |
          curl --fail -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --max-time 30
